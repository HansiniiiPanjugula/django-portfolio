{% extends 'portfolio/base.html' %}
{% block content %}
<section class="section">
    <h2 class="section-title fade-in" style="justify-content: center;">Get In Touch</h2>

    <div class="contact-container fade-in">
        <p>
            Although I'm not currently looking for any new opportunities, my inbox is always open. Whether you have a
            question or just want to say hi, I'll try my best to get back to you!
        </p>

        <div class="card" style="margin-top: 30px; text-align: center; width: 100%;">
            <div style="font-size: 18px; color: var(--text-primary); margin-bottom: 20px;">
                <i class="fas fa-envelope" style="color: var(--accent-color); margin-right: 10px;"></i> hans@gmail.com
            </div>
            <div style="font-size: 18px; color: var(--text-primary); margin-bottom: 0;">
                <i class="fas fa-phone" style="color: var(--accent-color); margin-right: 10px;"></i> +91XXXXXXXXX
            </div>
        </div>
    </div>
</section>
{% endblock %}
