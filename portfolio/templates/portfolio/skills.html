{% extends 'portfolio/base.html' %}
{% block content %}
<section class="section">
    <h2 class="section-title fade-in">Technical Skills</h2>

    <div class="skills-grid">
        <div class="card fade-in">
            <div class="skill-category">
                <h3>Backend Development</h3>
                
                <div class="skill-item">
                    <div class="skill-info">
                        <span>Python</span>
                        <span>90%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress" data-width="90%"></div>
                    </div>
                </div>

                <div class="skill-item">
                    <div class="skill-info">
                        <span>Django</span>
                        <span>85%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress" data-width="85%"></div>
                    </div>
                </div>
                
                <div class="skill-item">
                    <div class="skill-info">
                        <span>SQL / Databases</span>
                        <span>75%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress" data-width="75%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card fade-in">
            <div class="skill-category">
                <h3>Frontend Development</h3>
                
                <div class="skill-item">
                    <div class="skill-info">
                        <span>HTML & CSS</span>
                        <span>95%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress" data-width="95%"></div>
                    </div>
                </div>

                <div class="skill-item">
                    <div class="skill-info">
                        <span>JavaScript</span>
                        <span>80%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress" data-width="80%"></div>
                    </div>
                </div>
                
                <div class="skill-item">
                    <div class="skill-info">
                        <span>React.js</span>
                        <span>60%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress" data-width="60%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
